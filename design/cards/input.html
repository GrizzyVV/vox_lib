<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · inputDialog</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../fonts.css" />
<style>
  :root { --mint:#04FFD1; --modal:#161616; --field:#0F0F12; --line:#28282A; --text:#EDEDED; --copy:#B5B5B6; --muted:#6b6b70;
    --font-ui:'Geist','Inter',sans-serif; --font-body:'Inter',sans-serif; --chamfer:8px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0A; font-family:var(--font-body); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:30px; }
  .dialog { width:360px; background:var(--modal); border:1px solid var(--line);
    clip-path:polygon(0 0,100% 0,100% calc(100% - var(--chamfer)),calc(100% - var(--chamfer)) 100%,0 100%);
    box-shadow:0 24px 60px rgba(0,0,0,.6); }
  .dialog__header { font-family:var(--font-ui); font-weight:600; font-size:16px; padding:18px 20px 0; }
  .dialog__accent { height:2px; width:40px; background:var(--mint); margin:10px 20px 16px; }
  .body { padding:0 20px 18px; display:flex; flex-direction:column; gap:14px; }
  .field__label { font-family:var(--font-ui); font-size:12px; font-weight:500; color:var(--copy); margin-bottom:6px; display:flex; gap:7px; align-items:center; }
  .field__label .req { color:var(--mint); }
  .control { width:100%; background:var(--field); border:1px solid var(--line); color:var(--text); font-family:var(--font-body);
    font-size:13px; padding:9px 11px; border-radius:4px; display:flex; align-items:center; gap:8px; }
  .control .ph { color:var(--muted); }
  .control i { color:var(--muted); }
  .control.select { justify-content:space-between; }
  .row2 { display:flex; gap:12px; } .row2 > div { flex:1; }
  .check { display:flex; align-items:center; gap:9px; font-size:13px; color:var(--text); }
  .check .box { width:18px; height:18px; border-radius:4px; background:var(--mint); display:grid; place-items:center; color:#000; font-size:10px; }
  .swatch { width:22px; height:22px; border-radius:4px; border:1px solid var(--line); }
  .actions { display:flex; justify-content:flex-end; gap:10px; padding:4px 20px 20px; }
  .btn { font-family:var(--font-ui); font-weight:550; font-size:13px; padding:9px 18px; cursor:pointer; border:1px solid transparent; }
  .btn--ghost { background:transparent; border-color:var(--line); color:var(--copy); border-radius:4px; }
  .btn--primary { background:var(--mint); color:#000; clip-path:polygon(0 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%); }
</style>
</head>
<body>
  <div class="dialog">
    <div class="dialog__header">Police Locker</div>
    <div class="dialog__accent"></div>
    <div class="body">
      <div>
        <div class="field__label">Locker name <span class="req">*</span></div>
        <div class="control"><span class="ph">e.g. Locker 12</span></div>
      </div>
      <div class="row2">
        <div>
          <div class="field__label"><i class="fa-solid fa-hashtag"></i> Slot</div>
          <div class="control">24</div>
        </div>
        <div>
          <div class="field__label">Access</div>
          <div class="control select">Officer <i class="fa-solid fa-chevron-down"></i></div>
        </div>
      </div>
      <div class="check"><span class="box"><i class="fa-solid fa-check"></i></span> Shared with department</div>
      <div>
        <div class="field__label">Tag colour</div>
        <div class="control"><span class="swatch" style="background:#04FFD1"></span> #04FFD1</div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn--ghost">Cancel</button>
      <button class="btn btn--primary">CONFIRM</button>
    </div>
  </div>
</body>
</html>
