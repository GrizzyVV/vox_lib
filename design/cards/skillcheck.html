<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · skillCheck</title>
<link rel="stylesheet" href="../fonts.css" />
<style>
  :root { --mint:#04FFD1; --surface:#1E1E24; --line:#28282A; --text:#EDEDED; --copy:#B5B5B6;
    --font-ui:'Geist','Inter',sans-serif; --font-body:'Inter',sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0A; font-family:var(--font-body); color:var(--text); min-height:100vh; display:flex; flex-direction:column; gap:18px; align-items:center; justify-content:center; padding:30px; }
  .ring { position:relative; width:220px; height:220px; }
  .ring svg { width:100%; height:100%; }
  .track { fill:none; stroke:var(--line); stroke-width:10; }
  .arc { fill:none; stroke:var(--mint); stroke-width:10; stroke-linecap:round; filter:drop-shadow(0 0 6px rgba(4,255,209,.6)); }
  .dot { fill:var(--mint); stroke:#0A0A0A; stroke-width:3; }
  .center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
  .key { display:grid; place-items:center; width:54px; height:54px; background:#0A0A0A; border:1px solid var(--line); border-bottom-width:3px; border-radius:8px;
    font-family:var(--font-ui); font-weight:600; font-size:26px; color:var(--mint); }
  .center small { color:var(--copy); font-size:12px; letter-spacing:.04em; }
  .label { font-family:var(--font-ui); font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#6b6b70; }
</style>
</head>
<body>
  <div class="label">lib.skillCheck</div>
  <div class="ring">
    <svg viewBox="0 0 200 200">
      <circle class="track" cx="100" cy="100" r="80"></circle>
      <!-- success area (~50deg over the top) -->
      <path class="arc" d="M 66.2 27.5 A 80 80 0 0 1 133.8 27.5"></path>
      <!-- sweeping indicator, sitting inside the success arc -->
      <g transform="rotate(8 100 100)"><circle class="dot" cx="100" cy="20" r="9"></circle></g>
    </svg>
    <div class="center">
      <div class="key">E</div>
      <small>press in the zone</small>
    </div>
  </div>
</body>
</html>
