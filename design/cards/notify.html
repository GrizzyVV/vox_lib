<!-- @dsCard group="Notifications" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · notify</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../fonts.css" />
<style>
  :root {
    --mint: #04FFD1; --mint-soft: #63E6BE; --coral: #FF6B61; --alert: #CE2318;
    --surface: #1E1E24; --line: #28282A; --text: #EDEDED; --copy: #B5B5B6;
    --font-ui: 'Geist','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    --font-body: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    --chamfer: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A0A; font-family: var(--font-body); color: var(--text); padding: 28px; min-height: 100vh; }
  .grid { display: flex; flex-direction: column; gap: 12px; max-width: 380px; margin: 0 auto; }
  .label { font-family: var(--font-ui); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #6b6b70; margin: 6px 0 2px; }

  .toast {
    position: relative; min-width: 240px; max-width: 380px;
    background: var(--surface); border: 1px solid var(--line);
    border-left: 3px solid var(--accent, var(--mint));
    color: var(--text); padding: 12px 14px; display: flex; gap: 12px; align-items: center;
    clip-path: polygon(0 0, 100% 0, 100% calc(100% - var(--chamfer)), calc(100% - var(--chamfer)) 100%, 0 100%);
    box-shadow: 0 6px 24px rgba(0,0,0,.45); overflow: hidden;
  }
  .toast__icon { flex: 0 0 auto; width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-size: 14px; background: var(--accent, var(--mint)); color: #000; }
  .toast__icon.bare { background: transparent; color: var(--ic, var(--mint)); width: auto; height: auto; }
  .toast__body { flex: 1 1 auto; min-width: 0; }
  .toast__title { font-family: var(--font-ui); font-weight: 600; font-size: 14px; line-height: 1.3; }
  .toast__desc { font-size: 13px; line-height: 1.4; color: var(--copy); margin-top: 3px; }
  .toast__desc strong { color: var(--text); font-weight: 600; }
  .toast__bar { position: absolute; left: 0; bottom: 0; height: 2px; background: var(--accent, var(--mint)); }
  .inform { --accent: var(--mint); } .success { --accent: var(--mint-soft); }
  .warning { --accent: var(--coral); } .error { --accent: var(--alert); }
</style>
</head>
<body>
  <div class="grid">
    <div class="label">lib.notify · type variants</div>

    <div class="toast success">
      <div class="toast__icon"><i class="fa-solid fa-circle-check"></i></div>
      <div class="toast__body"><div class="toast__title">Success</div><div class="toast__desc">Player <strong>saved</strong> successfully</div></div>
      <div class="toast__bar" style="width:62%"></div>
    </div>

    <div class="toast error">
      <div class="toast__icon"><i class="fa-solid fa-circle-exclamation"></i></div>
      <div class="toast__body"><div class="toast__title">Error</div><div class="toast__desc">Transaction failed</div></div>
      <div class="toast__bar" style="width:38%"></div>
    </div>

    <div class="toast warning">
      <div class="toast__icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="toast__body"><div class="toast__title">Warning</div><div class="toast__desc">Low ammo remaining</div></div>
      <div class="toast__bar" style="width:80%"></div>
    </div>

    <div class="toast inform">
      <div class="toast__icon"><i class="fa-solid fa-circle-info"></i></div>
      <div class="toast__body"><div class="toast__title">Inform</div><div class="toast__desc">Press <strong>[E]</strong> to interact</div></div>
      <div class="toast__bar" style="width:50%"></div>
    </div>

    <div class="label">custom icon + color · description-only</div>

    <div class="toast inform">
      <div class="toast__icon bare" style="--ic:#CE2318"><i class="fa-solid fa-ban" style="font-size:20px"></i></div>
      <div class="toast__body"><div class="toast__title">Banned</div><div class="toast__desc">You have been banned from the server</div></div>
    </div>

    <div class="toast inform">
      <div class="toast__icon"><i class="fa-solid fa-circle-info"></i></div>
      <div class="toast__body"><div class="toast__desc">Description-only toast, no title</div></div>
    </div>
  </div>
</body>
</html>
