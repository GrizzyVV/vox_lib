<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · radial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../fonts.css" />
<style>
  :root { --mint:#04FFD1; --surface:#1E1E24; --line:#28282A; --text:#EDEDED; --copy:#B5B5B6;
    --font-ui:'Geist','Inter',sans-serif; --font-body:'Inter',sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0A; font-family:var(--font-body); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:30px; }
  .wheel { position:relative; width:300px; height:300px; }
  /* faint guide ring */
  .wheel::before { content:''; position:absolute; inset:38px; border:1px dashed rgba(40,40,42,.8); border-radius:50%; }

  .hub { position:absolute; left:150px; top:150px; transform:translate(-50%,-50%); width:84px; height:84px; border-radius:50%;
    background:var(--surface); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
  .hub .k { font-family:var(--font-ui); font-weight:600; font-size:18px; color:var(--mint); }
  .hub small { color:var(--copy); font-size:10px; letter-spacing:.06em; }

  .opt { position:absolute; transform:translate(-50%,-50%); display:flex; flex-direction:column; align-items:center; gap:6px; width:74px; }
  .opt .ic { width:52px; height:52px; border-radius:50%; background:var(--surface); border:1px solid var(--line); display:grid; place-items:center; font-size:18px; color:var(--text); }
  .opt .lb { font-family:var(--font-ui); font-size:11px; color:var(--copy); text-align:center; }
  .opt--active .ic { background:var(--mint); border-color:var(--mint); color:#000; box-shadow:0 0 16px rgba(4,255,209,.45); }
  .opt--active .lb { color:var(--mint); }
</style>
</head>
<body>
  <div class="wheel">
    <div class="hub"><span class="k">Z</span><small>RADIAL</small></div>

    <div class="opt opt--active" style="left:150px; top:45px;"><div class="ic"><i class="fa-solid fa-shield-halved"></i></div><div class="lb">Police</div></div>
    <div class="opt" style="left:241px; top:97px;"><div class="ic"><i class="fa-solid fa-briefcase"></i></div><div class="lb">Business</div></div>
    <div class="opt" style="left:241px; top:203px;"><div class="ic"><i class="fa-solid fa-warehouse"></i></div><div class="lb">Garage</div></div>
    <div class="opt" style="left:150px; top:255px;"><div class="ic"><i class="fa-solid fa-hand"></i></div><div class="lb">Frisk</div></div>
    <div class="opt" style="left:59px; top:203px;"><div class="ic"><i class="fa-solid fa-magnifying-glass"></i></div><div class="lb">Search</div></div>
    <div class="opt" style="left:59px; top:97px;"><div class="ic"><i class="fa-solid fa-bus"></i></div><div class="lb">Jail</div></div>
  </div>
</body>
</html>
