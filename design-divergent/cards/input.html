<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · inputDialog (divergent)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../fonts.css" />
<style>
  :root { --red:#F0454E; --panel:rgba(20,20,22,.9); --field:rgba(255,255,255,.04); --line:rgba(255,255,255,.10); --text:#F4F5F7; --copy:#9aa0a6; --muted:#5a6066;
    --ui:'Tomorrow',sans-serif; --disp:'Anton',sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0A; font-family:var(--ui); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:30px; }
  .dlg { width:360px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:20px 22px; backdrop-filter:blur(14px); }
  .eyebrow { font-size:10px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--red); }
  .title { font-family:var(--disp); font-size:26px; text-transform:uppercase; line-height:1; margin:6px 0 16px; }
  .body { display:flex; flex-direction:column; gap:13px; }
  .flabel { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--copy); margin-bottom:6px; display:flex; gap:6px; align-items:center; }
  .flabel .req { color:var(--red); }
  .control { width:100%; background:var(--field); border:1px solid var(--line); border-radius:7px; color:var(--text); font-family:var(--ui); font-size:13px; padding:9px 11px; display:flex; align-items:center; gap:8px; }
  .control.focus { border-color:var(--red); box-shadow:0 0 0 2px rgba(240,69,78,.18); }
  .control .ph { color:var(--muted); }
  .control i { color:var(--muted); }
  .control.sel { justify-content:space-between; }
  .row2 { display:flex; gap:11px; } .row2>div { flex:1; }
  .check { display:flex; align-items:center; gap:9px; font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
  .check .box { width:18px; height:18px; border-radius:5px; background:var(--red); display:grid; place-items:center; color:#fff; font-size:9px; }
  .swatch { width:20px; height:20px; border-radius:5px; }
  .actions { display:flex; justify-content:flex-end; gap:10px; margin-top:18px; }
  .btn { font-family:var(--ui); font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; padding:9px 18px; border-radius:6px; cursor:pointer; border:1px solid transparent; }
  .btn--ghost { background:transparent; border-color:var(--line); color:var(--copy); }
  .btn--primary { background:linear-gradient(180deg,#F0454E,#C8313C); color:#fff; box-shadow:0 4px 16px rgba(240,69,78,.32); }
</style>
</head>
<body>
  <div class="dlg">
    <div class="eyebrow">// Police locker</div>
    <div class="title">New Locker</div>
    <div class="body">
      <div>
        <div class="flabel">Locker name <span class="req">*</span></div>
        <div class="control focus"><span class="ph">e.g. Locker 12</span></div>
      </div>
      <div class="row2">
        <div><div class="flabel"><i class="fa-solid fa-hashtag"></i> Slot</div><div class="control">24</div></div>
        <div><div class="flabel">Access</div><div class="control sel">Officer <i class="fa-solid fa-chevron-down"></i></div></div>
      </div>
      <div class="check"><span class="box"><i class="fa-solid fa-check"></i></span> Shared with department</div>
      <div>
        <div class="flabel">Tag colour</div>
        <div class="control"><span class="swatch" style="background:#F0454E"></span> #F0454E</div>
      </div>
    </div>
    <div class="actions"><button class="btn btn--ghost">Cancel</button><button class="btn btn--primary">Confirm</button></div>
  </div>
</body>
</html>
