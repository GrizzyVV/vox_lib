<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vox_lib · menu (divergent)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="../fonts.css" />
<style>
  :root { --red:#F0454E; --panel:rgba(255,255,255,.035); --raise:rgba(255,255,255,.06); --line:rgba(255,255,255,.10);
    --text:#F4F5F7; --copy:#9aa0a6; --ui:'Tomorrow',sans-serif; --disp:'Anton',sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0A; font-family:var(--ui); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:30px; }
  .menu { width:300px; background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; backdrop-filter:blur(10px); }

  .head { padding:15px 16px 13px; border-bottom:1px solid var(--line); }
  .eyebrow { font-size:9.5px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--red); }
  .title { font-family:var(--disp); font-size:26px; line-height:.95; letter-spacing:.02em; margin-top:5px; text-transform:uppercase; }

  .item { display:flex; align-items:center; gap:11px; padding:11px 16px; font-size:12.5px; letter-spacing:.04em; text-transform:uppercase; }
  .item--sel { background:var(--raise); box-shadow:inset 3px 0 0 var(--red); }
  .ic { width:18px; text-align:center; color:var(--copy); font-size:13px; }
  .item--sel .ic { color:var(--red); }
  .lbl { font-weight:600; flex:1 1 auto; }
  .check { width:18px; height:18px; border-radius:4px; border:1px solid var(--line); display:grid; place-items:center; font-size:9px; color:transparent; }
  .check.on { background:var(--red); border-color:var(--red); color:#fff; }
  .scroll { display:flex; align-items:center; gap:10px; }
  .scroll i { color:var(--red); font-size:10px; }
  .scroll .val { min-width:56px; text-align:center; font-weight:500; color:var(--text); }
  .hint { padding:10px 16px; border-top:1px solid var(--line); color:#5a6066; font-size:9.5px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; display:flex; gap:16px; }
</style>
</head>
<body>
  <div class="menu">
    <div class="head"><div class="eyebrow">// Vehicle</div><div class="title">Settings</div></div>

    <div class="item item--sel">
      <span class="ic"><i class="fa-solid fa-gauge-high"></i></span><span class="lbl">Render distance</span>
      <span class="scroll"><i class="fa-solid fa-chevron-left"></i><span class="val">High</span><i class="fa-solid fa-chevron-right"></i></span>
    </div>
    <div class="item">
      <span class="ic"><i class="fa-solid fa-eye"></i></span><span class="lbl">Show HUD</span>
      <span class="check on"><i class="fa-solid fa-check"></i></span>
    </div>
    <div class="item">
      <span class="ic"><i class="fa-solid fa-skull"></i></span><span class="lbl">Difficulty</span>
      <span class="scroll"><i class="fa-solid fa-chevron-left"></i><span class="val">Normal</span><i class="fa-solid fa-chevron-right"></i></span>
    </div>
    <div class="item">
      <span class="ic"><i class="fa-solid fa-rotate-left"></i></span><span class="lbl">Reset to default</span>
    </div>

    <div class="hint"><span>↑↓ Navigate</span><span>↵ Select</span><span>⌫ Back</span></div>
  </div>
</body>
</html>
